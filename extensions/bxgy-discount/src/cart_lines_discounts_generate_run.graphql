query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        ... on ProductVariant {
          product {
            id
            vendor
            productType
          }
        }
      }
    }
  }
  discount {
    metafield(namespace: "bxgy", key: "config") {
      jsonValue
    }
  }
}
