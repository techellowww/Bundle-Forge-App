query Input {
  cart {
    lines {
      id
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            vendor
            productType
          }
        }
      }
    }
  }

  discount {
    metafield(namespace: "quantity_break", key: "tiers") {
      jsonValue
    }
  }
}
